  label { display: block; margin: 14px 0 6px; font-weight: 600; font-size: 14px; }
  input, select { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #ccd; border-radius: 10px; font-size: 15px; }

<body>
<h2>QQ 改机型 · 网页选 · Shadowrocket 改</h2>
<p class="tip">
  本页只负责把你在网页上选的机型/配色，写回 Shadowrocket 加载的脚本（<code>qq_model.js</code>）。<br>
  真正改写的是你手机上的 Shadowrocket（无需 Cookie）。<br>
  ① 填 GitHub PAT（需能推送到公开脚本仓库 <code>qq-online-status-script</code>，即 repo 权限）。<br>
  ② 选机型 + 配色 → 点「应用」→ 在 Shadowrocket 里把该模块关掉再打开重载脚本 → QQ 重新保存在线状态。
</p>

<label>GitHub PAT（本地保存）</label>
<input id="pat" type="password" placeholder="ghp_..." autocomplete="off">

<label>脚本仓库 owner/repo（公开脚本仓）</label>
<input id="repo" value="qq1643240/qq-online-status-script">

<label>机型</label>
<select id="model"></select>

<label>配色</label>
<select id="color"></select>

<button id="go">应用</button>
<div id="msg"></div>

  "iPhone17,1": { "name": "iPhone 16 Pro", "colors": ["原色钛金属", "沙漠钛金属", "白色钛金属", "黑色钛金属"] },
  "iPhone17,2": { "name": "iPhone 16 Pro Max", "colors": ["原色钛金属", "沙漠钛金属", "白色钛金属", "黑色钛金属"] },
  "iPhone18,3": { "name": "iPhone 17", "colors": ["黑色", "白色", "钢铁灰", "绿色", "紫色", "浅蓝色"] },
  "iPhone18,1": { "name": "iPhone 17 Pro", "colors": ["银色", "宇宙橙", "深蓝色", "黑色"] },
  "iPhone18,2": { "name": "iPhone 17 Pro Max", "colors": ["银色", "宇宙橙", "深蓝色", "黑色"] },
  "iPhone18,4": { "name": "iPhone Air", "colors": ["黑色", "白色", "浅蓝色", "浅金色"] },
  "iPhone18,5": { "name": "iPhone 17e", "colors": ["黑色", "白色", "浅蓝色"] }

const modelSel = document.getElementById('model');
const colorSel = document.getElementById('color');
for (const [id, info] of Object.entries(MODELS)) {
  const o = document.createElement('option');
  o.value = id; o.textContent = id + '  ' + info.name;
  modelSel.appendChild(o);
}
function fillColors() {
  const info = MODELS[modelSel.value] || { colors: [] };
  colorSel.innerHTML = '';
  (info.colors || []).forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    colorSel.appendChild(o);
  });
}
modelSel.addEventListener('change', fillColors);
fillColors();

const patInput = document.getElementById('pat');
const repoInput = document.getElementById('repo');
const msg = document.getElementById('msg');
const setMsg = t => { msg.textContent = t; };

if (localStorage.getItem('qq_pat')) patInput.value = localStorage.getItem('qq_pat');
if (localStorage.getItem('qq_repo')) repoInput.value = localStorage.getItem('qq_repo');

function b64decode(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}
function b64encode(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}
async function getFile(repo, path, pat) {
  const [o, n] = repo.split('/');
  const r = await fetch(`https://api.github.com/repos/${o}/${n}/contents/${path}`, {
    headers: { 'Authorization': 'Bearer ' + pat, 'Accept': 'application/vnd.github+json' }
  });
  if (!r.ok) throw new Error('读取 ' + path + ' 失败: ' + r.status);
  const j = await r.json();
  return { content: j.content, sha: j.sha };
}
async function putFile(repo, path, pat, content, sha, message) {
  const [o, n] = repo.split('/');
  const r = await fetch(`https://api.github.com/repos/${o}/${n}/contents/${path}`, {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + pat, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, content: b64encode(content), sha })
  });
  if (!r.ok) throw new Error('写入 ' + path + ' 失败: ' + r.status);
}

document.getElementById('go').onclick = async () => {
  const pat = patInput.value.trim();
  const repo = repoInput.value.trim();
  const modelId = modelSel.value;
  const name = MODELS[modelId].name;
  const color = colorSel.value;
  if (!pat) { setMsg('请填写 GitHub PAT'); return; }
  if (!repo.includes('/')) { setMsg('仓库格式应为 owner/repo'); return; }
  localStorage.setItem('qq_pat', pat);
  localStorage.setItem('qq_repo', repo);
  setMsg('正在写回脚本…');
  try {
    const f = await getFile(repo, 'qq_model.js', pat);
    let src = b64decode(f.content);
    src = src.replace(/const TARGET_MODEL\s*=\s*"[^"]*";/, `const TARGET_MODEL = "${modelId}";`);
    src = src.replace(/const TARGET_NAME\s*=\s*"[^"]*";/, `const TARGET_NAME  = "${name}";`);
    src = src.replace(/const COLOR_MODE\s*=\s*"[^"]*";/, `const COLOR_MODE  = "fixed";`);
    src = src.replace(/const FIXED_COLOR\s*=\s*"[^"]*";/, `const FIXED_COLOR = "${color}";`);
    await putFile(repo, 'qq_model.js', pat, src, f.sha, `设置机型为 ${name} (${color})`);
    setMsg(
      `✅ 已把脚本更新为：${name} (${color})\n\n` +
      `下一步（在 iPhone 上）：\n` +
      `1) Shadowrocket 里把该模块「关掉再打开」（或重新导入），让它重载新脚本；\n` +
      `2) 打开 QQ → 设置 → 账号管理 → 在线状态 → 保存一次；\n` +
      `3) 你的在线状态就会显示「${name} (${color})」。`
    );
  } catch (e) {
    setMsg('❌ 出错：' + e.message + '\n（确认 PAT 有该公开仓库的 repo 权限；若被浏览器拦截，请手动改 qq_model.js 的常量）');
  }
};
